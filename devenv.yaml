# devenv.yaml — falcon developer environment (replaces the flake devShell).
#
# nixpkgs and rust-overlay are pinned to the SAME revs as flake.lock so devenv
# shares the flake's evaluation and binary cache (the toolchain, cargo-*, … are
# cache hits, not rebuilds). The `devenv-pin` flake check enforces this — when
# you bump flake.lock, bump these revs too (or run `devenv update`).
inputs:
  nixpkgs:
    url: github:NixOS/nixpkgs/8c3cede7ddc26bd659d2d383b5610efbd2c7a16e
  rust-overlay:
    url: github:oxalica/rust-overlay/fe64e6b409dc513274d2941f8da13bbd0fdcf44e
    inputs:
      nixpkgs:
        follows: nixpkgs
